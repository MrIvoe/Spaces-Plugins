name: Validate plugin manifests

on:
  push:
    paths:
      - 'plugins/**/plugin.json'
      - 'scripts/validate-plugin-manifests.ps1'
      - 'plugin-manifest.schema.json'
      - '.github/workflows/validate-plugins.yml'
  pull_request:
    paths:
      - 'plugins/**/plugin.json'
      - 'scripts/validate-plugin-manifests.ps1'
      - 'plugin-manifest.schema.json'
      - '.github/workflows/validate-plugins.yml'

jobs:
  validate:
    name: Validate plugin manifest contract
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run PowerShell manifest validator
        shell: pwsh
        run: ./scripts/validate-plugin-manifests.ps1
